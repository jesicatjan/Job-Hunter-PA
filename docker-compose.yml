version: "3.9"
services:
  backend:
    build: .
    container_name: job-hunter-backend
    env_file:
      - .env
    ports:
      - "8000:8000"

  bot:
    build: .
    container_name: job-hunter-bot
    command: ["python", "-m", "bot.telegram_bot"]
    env_file:
      - .env
    depends_on:
      - backend
